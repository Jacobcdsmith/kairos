name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Ruff format
        run: ruff format --check src tests

      - name: Ruff lint
        run: ruff check src tests

      - name: Pyright
        run: pyright

      - name: Pytest
        run: pytest -q

      - name: Demo (end-to-end smoke test)
        run: KAIROS_BIN="$(python -c 'import shutil; print(shutil.which("kairos"))')" bash scripts/demo.sh
